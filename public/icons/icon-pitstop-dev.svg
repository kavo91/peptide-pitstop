      <stop offset="0" stop-color="#FF7A3D"/><stop offset="1" stop-color="#FF5B14"/>
    </linearGradient>
    <clipPath id="card"><rect width="512" height="512" rx="112"/></clipPath>
  </defs>
  <g clip-path="url(#card)">
