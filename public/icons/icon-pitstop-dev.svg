    <circle cx="256" cy="232" r="54" fill="none" stroke="#F2F3F5" stroke-opacity="0.30" stroke-width="15"/>
    <path d="M158 330 L354 134" stroke="#F2F3F5" stroke-width="26" stroke-linecap="round"/>
